<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GümüşBakım | Sisteme Giriş{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Sistemin dış kapısı için güven veren, tam sayfa (100vh) ortalanmış tasarım */
        body {
            /* Hafif medikal mavi/gri gradient (renk geçişli) arka plan */
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            height: 100vh;
            display: flex;
            align-items: center; /* Dikeyde ortala */
            justify-content: center; /* Yatayda ortala */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        /* Giriş kutusunu saracak olan esnek yapı */
        .auth-wrapper {
            width: 100%;
            max-width: 400px; /* Mobilde tam ekran, PC'de kibar bir kutu */
            padding: 20px;
        }

        /* GümüşBakım Logosu İçin Ufak Bir Ayar */
        .auth-logo-text {
            color: #0d6efd;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    <main class="auth-wrapper">
        {% block content %}
        
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
