<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GümüşBakım Dashboard{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Renk Paleti - Ferah, Premium ve Göz Yormayan Tonlar */
            --gb-bg: #f4f7fe;         /* Soft arka plan */
            --gb-card: #ffffff;       /* Kart beyazı */
            --gb-text-dark: #2b3674;  /* Koyu lacivert (Siyah yerine) */
            --gb-text-muted: #a3aed1; /* Yumuşak gri/mavi */
            --gb-primary: #4318ff;    /* Canlı Ana Mavi */
            --gb-primary-hover: #3311db;
            --gb-info: #39b8ff;       /* Açık Mavi */
            --gb-success: #05cd99;    /* Canlı Yeşil */
            --gb-danger: #ee5d50;     /* Soft Kırmızı */
            --gb-warning: #ffce20;    /* Sarmaşık Sarısı */
        }

        body {
            background-color: var(--gb-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--gb-text-dark);
        }

        /* 1. Global Kart Tasarımı */
        .gb-card {
            background: var(--gb-card);
            border: none;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(112, 144, 176, 0.12); /* Soft geniş gölge */
            transition: all 0.3s ease;
        }
        .gb-card:hover {
            box-shadow: 0px 15px 50px rgba(112, 144, 176, 0.18);
        }

        /* 2. Global Butonlar */
        .btn-gb-primary {
            background-color: var(--gb-primary);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px 20px;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-gb-primary:hover {
            background-color: var(--gb-primary-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 24, 255, 0.3);
        }
        .btn-gb-outline {
            background: transparent;
            color: var(--gb-primary);
            border: 2px solid var(--gb-primary);
            border-radius: 12px;
            font-weight: 600;
            padding: 8px 18px;
            transition: all 0.3s ease;
        }
        .btn-gb-outline:hover {
            background: var(--gb-primary);
            color: white;
        }

        /* 3. Global Navbar (Cam Efekti - Glassmorphism) */
        .gb-navbar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin: 15px 20px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .navbar-brand { color: var(--gb-text-dark) !important; font-weight: 800; letter-spacing: -0.5px; }

        /* 4. Global Tablolar */
        .gb-table { width: 100%; margin-bottom: 0; }
        .gb-table th {
            color: var(--gb-text-muted);
            font-weight: 600;
            font-size: 0.80rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e9edf7;
            padding: 15px;
        }
        .gb-table td {
            color: var(--gb-text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            vertical-align: middle;
            border-bottom: 1px solid #e9edf7;
            padding: 15px;
        }

        /* 5. Modern Badge'ler (Etiketler) */
        .gb-badge-success { background: rgba(5, 205, 153, 0.1); color: var(--gb-success); border-radius: 10px; padding: 6px 14px; font-weight: 700; }
        .gb-badge-danger { background: rgba(238, 93, 80, 0.1); color: var(--gb-danger); border-radius: 10px; padding: 6px 14px; font-weight: 700; }
        .gb-badge-info { background: rgba(57, 184, 255, 0.1); color: var(--gb-info); border-radius: 10px; padding: 6px 14px; font-weight: 700; }
        .gb-badge-light { background: #f4f7fe; color: var(--gb-text-muted); border-radius: 10px; padding: 6px 14px; font-weight: 700; border: 1px solid #e9edf7; }

        /* 6. Global Sekmeler (Nav Tabs) */
        .gb-tabs {
            background: #f4f7fe;
            border-radius: 15px;
            padding: 5px;
            border: none;
        }
        .gb-tabs .nav-link {
            color: var(--gb-text-muted);
            font-weight: 700;
            border-radius: 12px;
            border: none;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        .gb-tabs .nav-link.active {
            background: white;
            color: var(--gb-primary);
            box-shadow: 0px 4px 15px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg gb-navbar sticky-top px-4 py-2">
        <div class="container-fluid">
            <a class="navbar-brand fs-4" href="{% url 'dashboard' %}">
                <i class="fa-solid fa-truck-medical text-primary me-2"></i>GümüşBakım
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#personelMenu">
                <i class="fa-solid fa-bars" style="color: var(--gb-text-dark);"></i>
            </button>

            <div class="collapse navbar-collapse" id="personelMenu">
                <ul class="navbar-nav ms-auto align-items-center mt-3 mt-lg-0">
                    <li class="nav-item me-lg-4 mb-2 mb-lg-0 fw-bold" style="color: var(--gb-text-muted);">
                        <i class="fa-solid fa-user-nurse me-2" style="color: var(--gb-primary);"></i> 
                        {{ request.user.username|default:"Personel" }}
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-danger rounded-pill px-4 fw-bold shadow-sm" href="{% url 'home' %}">
                            <i class="fa-solid fa-power-off me-1"></i> Çıkış
                        </a>
                    </li>
                </ul>
                
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
