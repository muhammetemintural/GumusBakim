<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GümüşBakım | Operasyon Paneli{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f7fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background-color: #0d6efd; 
        }
        .navbar-brand, .nav-link {
            color: #ffffff !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #d1e7dd !important; 
        }
        .content-area {
            padding-top: 2rem;
            padding-bottom: 5rem; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top shadow-sm py-2">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">
                <i class="fa-solid fa-truck-medical me-2"></i>GümüşBakım
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#personelMenu" aria-controls="personelMenu" aria-expanded="false" aria-label="Menüyü Aç">
                <i class="fa-solid fa-bars text-white fs-2"></i>
            </button>

            <div class="collapse navbar-collapse" id="personelMenu">
                <ul class="navbar-nav ms-auto align-items-center mt-3 mt-lg-0">
                    <li class="nav-item mb-2 mb-lg-0 me-lg-3">
                        <span class="nav-link">
                            <i class="fa-solid fa-user-nurse me-1"></i> 
                            Hoş geldin, {{ request.user.username|default:"Personel" }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-danger btn-sm rounded-pill px-4 shadow-sm" href="{% url 'home' %}">
                            <i class="fa-solid fa-power-off me-1"></i> Çıkış Yap
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container content-area">
        {% block content %}
        
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
