{% extends 'base.html' %}

{% block title %}Yeni Hasta Kaydı | GümüşBakım{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-primary text-white pt-4 pb-3 px-4 rounded-top-4">
                <h4 class="mb-0"><i class="fa-solid fa-user-plus me-2"></i>Yeni Hasta Kaydı</h4>
            </div>
            
            <div class="card-body p-4 p-md-5 bg-white">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        {% for field in form %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-muted small">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'dashboard' %}" class="btn btn-light btn-lg px-4 rounded-pill">İptal Et</a>
                        <button type="submit" class="btn btn-success btn-lg px-5 rounded-pill shadow-sm">
                            <i class="fa-solid fa-check me-2"></i>Sisteme Kaydet
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
